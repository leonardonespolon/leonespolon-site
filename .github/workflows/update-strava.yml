name: Update Strava Stats

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and update Strava stats
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import re
          import os

          client_id     = os.environ["STRAVA_CLIENT_ID"]
          client_secret = os.environ["STRAVA_CLIENT_SECRET"]
          refresh_token = os.environ["STRAVA_REFRESH_TOKEN"]

          # ── Refresh access token ──────────────────────────────────────
          payload = urllib.parse.urlencode({
              "client_id":     client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type":    "refresh_token",
          }).encode()
          req  = urllib.request.Request("https://www.strava.com/oauth/token", data=payload)
          resp = json.loads(urllib.request.urlopen(req).read())
          token   = resp["access_token"]
          headers = {"Authorization": f"Bearer {token}"}

          def get(url):
              r = urllib.request.Request(url, headers=headers)
              return json.loads(urllib.request.urlopen(r).read())

          athlete_id = get("https://www.strava.com/api/v3/athlete")["id"]

          # ── Total km ─────────────────────────────────────────────────
          stats    = get(f"https://www.strava.com/api/v3/athletes/{athlete_id}/stats")
          total_km = round(stats["all_run_totals"]["distance"] / 1000, 1)
          print(f"Total km: {total_km}")

          # ── Patch index.html ──────────────────────────────────────────
          with open("index.html", "r") as f:
              html = f.read()

          def replace_stat(html, label, value):
              return re.sub(
                  rf'(<span class="post-link">{re.escape(label)}</span></div>'
                  rf'<span class="post-date">)[^<]*(</span>)',
                  rf'\g<1>{value}\2',
                  html
              )

          html = replace_stat(html, "KM run to date", f"{total_km} km")

          with open("index.html", "w") as f:
              f.write(html)

          print("index.html updated.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update Strava stats"
          git push
