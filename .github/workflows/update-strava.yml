name: Update Strava Stats

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and update Strava stats
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import re
          import os

          client_id     = os.environ["STRAVA_CLIENT_ID"]
          client_secret = os.environ["STRAVA_CLIENT_SECRET"]
          refresh_token = os.environ["STRAVA_REFRESH_TOKEN"]

          # ── Refresh access token ──────────────────────────────────────
          payload = urllib.parse.urlencode({
              "client_id":     client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type":    "refresh_token",
          }).encode()
          req  = urllib.request.Request("https://www.strava.com/oauth/token", data=payload)
          resp = json.loads(urllib.request.urlopen(req).read())
          token        = resp["access_token"]
          athlete_id   = resp["athlete"]["id"]
          headers      = {"Authorization": f"Bearer {token}"}

          def get(url):
              r = urllib.request.Request(url, headers=headers)
              return json.loads(urllib.request.urlopen(r).read())

          # ── Total km ─────────────────────────────────────────────────
          stats      = get(f"https://www.strava.com/api/v3/athletes/{athlete_id}/stats")
          total_m    = stats["all_run_totals"]["distance"]
          total_km   = round(total_m / 1000, 1)

          # ── Best efforts by distance ──────────────────────────────────
          # Map Strava best-effort names → our targets (seconds)
          targets = {
              "5k":           None,
              "10k":          None,
              "Half-Marathon": None,
              "Marathon":     None,
          }

          page = 1
          while True:
              activities = get(
                  f"https://www.strava.com/api/v3/athlete/activities"
                  f"?per_page=100&page={page}"
              )
              if not activities:
                  break
              for act in activities:
                  if act.get("type") != "Run":
                      continue
                  detail = get(f"https://www.strava.com/api/v3/activities/{act['id']}")
                  for effort in detail.get("best_efforts", []):
                      name = effort["name"]
                      if name in targets:
                          secs = effort["elapsed_time"]
                          if targets[name] is None or secs < targets[name]:
                              targets[name] = secs
              page += 1

          def fmt(secs):
              if secs is None:
                  return "NA"
              h = secs // 3600
              m = (secs % 3600) // 60
              s = secs % 60
              if h > 0:
                  return f"{h:02d}:{m:02d}:{s:02d}"
              return f"{m:02d}:{s:02d}"

          best_5k    = fmt(targets["5k"])
          best_10k   = fmt(targets["10k"])
          best_half  = fmt(targets["Half-Marathon"])
          best_full  = fmt(targets["Marathon"])

          print(f"Total km : {total_km}")
          print(f"5KM      : {best_5k}")
          print(f"10KM     : {best_10k}")
          print(f"Half     : {best_half}")
          print(f"Marathon : {best_full}")

          # ── Patch index.html ──────────────────────────────────────────
          with open("index.html", "r") as f:
              html = f.read()

          def replace_stat(html, label, value):
              return re.sub(
                  rf'(<span class="post-link">{re.escape(label)}</span></div>'
                  rf'<span class="post-date">)[^<]*(</span>)',
                  rf'\g<1>{value}\2',
                  html
              )

          html = replace_stat(html, "KM run to date", f"{total_km} km")
          html = replace_stat(html, "Marathon",       best_full)
          html = replace_stat(html, "Half Marathon",  best_half)
          html = replace_stat(html, "10KM",           best_10k)
          html = replace_stat(html, "5KM",            best_5k)

          with open("index.html", "w") as f:
              f.write(html)

          print("index.html updated.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update Strava stats"
          git push
