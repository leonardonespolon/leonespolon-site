name: Update Strava Stats

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and update Strava stats
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import re
          import os
          from datetime import datetime, timezone, timedelta

          client_id     = os.environ["STRAVA_CLIENT_ID"]
          client_secret = os.environ["STRAVA_CLIENT_SECRET"]
          refresh_token = os.environ["STRAVA_REFRESH_TOKEN"]

          # ── Refresh access token ──────────────────────────────────────
          payload = urllib.parse.urlencode({
              "client_id":     client_id,
              "client_secret": client_secret,
              "refresh_token": refresh_token,
              "grant_type":    "refresh_token",
          }).encode()
          req  = urllib.request.Request("https://www.strava.com/oauth/token", data=payload)
          resp = json.loads(urllib.request.urlopen(req).read())
          token   = resp["access_token"]
          headers = {"Authorization": f"Bearer {token}"}

          def get(url):
              r = urllib.request.Request(url, headers=headers)
              return json.loads(urllib.request.urlopen(r).read())

          athlete_id = get("https://www.strava.com/api/v3/athlete")["id"]

          # ── Total km ─────────────────────────────────────────────────
          stats    = get(f"https://www.strava.com/api/v3/athletes/{athlete_id}/stats")
          total_km = round(stats["all_run_totals"]["distance"] / 1000, 1)
          print(f"Total km: {total_km}")

          # ── Last 8 weeks of km ───────────────────────────────────────
          now = datetime.now(timezone.utc)
          this_monday = now - timedelta(days=now.weekday())
          this_monday = this_monday.replace(hour=0, minute=0, second=0, microsecond=0)
          weekly_km = []

          for i in range(7, -1, -1):  # 7 = oldest, 0 = current week
              week_start = this_monday - timedelta(weeks=i)
              week_end   = now if i == 0 else week_start + timedelta(days=7)
              after_ts   = int(week_start.timestamp())
              before_ts  = int(week_end.timestamp())
              acts = get(f"https://www.strava.com/api/v3/athlete/activities?after={after_ts}&before={before_ts}&per_page=100")
              km = round(sum(a["distance"] for a in acts if a.get("sport_type", a["type"]) in ("Run", "TrailRun")) / 1000, 1)
              weekly_km.append(km)

          this_week_km = weekly_km[-1]
          max_km = max(weekly_km) if max(weekly_km) > 0 else 1
          print(f"Weekly km: {weekly_km}")
          print(f"This week: {this_week_km} km")

          # ── Patch index.html ─────────────────────────────────────────
          with open("index.html", "r") as f:
              html = f.read()

          # Total km → data-target attribute
          html = re.sub(
              r'(class="running-km-number" data-target=")[^"]*(")',
              rf'\g<1>{total_km}\2',
              html
          )

          # This week label
          html = re.sub(
              r'(class="running-km-week">)[^<]*(</p>)',
              rf'\g<1>+{this_week_km} km this week\2',
              html
          )

          # Weekly bars between sentinel comments
          bar_html = ""
          for i, km in enumerate(weekly_km):
              pct = round((km / max_km) * 100)
              pct = max(pct, 4)  # minimum visible height
              is_current = (i == len(weekly_km) - 1)
              cls = "running-bar running-bar--current" if is_current else "running-bar"
              bar_html += f'        <div class="{cls}" style="height:{pct}%"></div>\n'

          html = re.sub(
              r'(<!-- BARS_START -->).*?(<!-- BARS_END -->)',
              rf'\1\n{bar_html}        \2',
              html,
              flags=re.DOTALL
          )

          with open("index.html", "w") as f:
              f.write(html)

          print("index.html updated.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update Strava stats"
          git push
