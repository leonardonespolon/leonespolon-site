<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ────────────────────────────────────────── */
    :root {
      --bg:       #F7F4EE;
      --surface:  #F0EDE5;
      --text:     #1C1917;
      --muted:    #78716C;
      --faint:    #A8A29E;
      --accent:   #3B7DD8;
      --accent-h: #2E63B0;
      --border:   #E2DDD5;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans:  'Instrument Sans', system-ui, sans-serif;
      --mono:  'JetBrains Mono', monospace;
      --col: 660px;
      --pad: 40px;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1C1917; --surface: #28231F; --text: #F5F0E8;
        --muted: #A8A29E; --faint: #78716C; --accent: #5A9AE8;
        --accent-h: #E08060; --border: #2E2A26;
      }
    }
    [data-theme="dark"]  { --bg: #1C1917; --surface: #28231F; --text: #F5F0E8; --muted: #A8A29E; --faint: #78716C; --accent: #5A9AE8; --accent-h: #E08060; --border: #2E2A26; }
    [data-theme="light"] { --bg: #F7F4EE; --surface: #F0EDE5; --text: #1C1917; --muted: #78716C; --faint: #A8A29E; --accent: #3B7DD8; --accent-h: #2E63B0; --border: #E2DDD5; }

    /* ── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--serif); line-height: 1.75; transition: background 0.2s, color 0.2s; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    /* ── Layout ───────────────────────────────────────────────── */
    .wrap { max-width: var(--col); margin: 0 auto; padding: 0 var(--pad); }
    @media (max-width: 600px) { :root { --pad: 20px; } html { font-size: 16px; } }

    /* ── Nav ──────────────────────────────────────────────────── */
    nav { padding: 40px 0 56px; }
    .nav-inner { display: flex; justify-content: space-between; align-items: baseline; gap: 24px; flex-wrap: wrap; }
    .site-name { font-family: var(--sans); font-size: 0.88rem; font-weight: 600; letter-spacing: 0.02em; color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-family: var(--sans); font-size: 0.78rem; color: var(--muted); letter-spacing: 0.02em; transition: color 0.15s; }
    .nav-links a:hover { color: var(--accent); }
    .theme-btn { background: none; border: 1px solid var(--border); border-radius: 100px; padding: 3px 11px; font-family: var(--sans); font-size: 0.68rem; color: var(--faint); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Article ──────────────────────────────────────────────── */
    .article-header { padding-bottom: 40px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
    .back-link { font-family: var(--sans); font-size: 0.75rem; color: var(--muted); display: inline-block; margin-bottom: 32px; transition: color 0.15s; }
    .back-link:hover { color: var(--accent); }
    .article-title { font-family: var(--serif); font-size: 2rem; font-weight: 600; line-height: 1.25; color: var(--text); margin-bottom: 16px; }
    .article-date { font-family: var(--sans); font-size: 0.75rem; color: var(--faint); }

    /* ── Article Body ─────────────────────────────────────────── */
    .article-body { padding-bottom: 80px; }
    .article-body p { margin-bottom: 1.5em; }
    .article-body h2 { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; margin: 2em 0 0.75em; }
    .article-body h3 { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; margin: 1.5em 0 0.5em; }
    .article-body a { color: var(--accent); border-bottom: 1px solid transparent; transition: border-color 0.15s; }
    .article-body a:hover { border-color: var(--accent); }
    .article-body strong { font-weight: 600; }
    .article-body em { font-style: italic; }
    .article-body blockquote { border-left: 3px solid var(--border); padding-left: 20px; color: var(--muted); margin: 1.5em 0; }
    .article-body code { font-family: var(--mono); font-size: 0.82em; background: var(--surface); padding: 2px 6px; border-radius: 4px; }
    .article-body ul, .article-body ol { padding-left: 1.5em; margin-bottom: 1.5em; }
    .article-body ul { list-style: disc; }
    .article-body ol { list-style: decimal; }
    .article-body li { margin-bottom: 0.4em; }
    .highlight { color: var(--accent); }

    /* ── Footer ───────────────────────────────────────────────── */
    footer { padding: 40px 0 56px; border-top: 1px solid var(--border); }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
    footer p, footer a { font-family: var(--sans); font-size: 0.72rem; color: var(--faint); }
    footer a { transition: color 0.15s; }
    footer a:hover { color: var(--accent); }
    .footer-links { display: flex; gap: 16px; }
  </style>
</head>

<script>
// Theme toggle: light ↔ dark
const btn = document.getElementById('theme-btn');
let dark = false;

try {
  const s = localStorage.getItem('theme');
  dark = s === 'dark' || (s === null && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  btn.textContent = dark ? 'Light' : 'Dark';
} catch(e) {}

btn.addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  btn.textContent = dark ? 'Light' : 'Dark';
  try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch(e) {}
});
</script>
